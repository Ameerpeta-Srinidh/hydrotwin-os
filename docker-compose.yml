version: '3.8'

services:
  kafka:
    image: confluentinc/confluent-local:7.5.0
    container_name: hydrotwin-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      CLUSTER_ID: 'hydrotwin-cluster-1234'
    volumes:
      - kafka_data:/var/lib/kafka/data

  influxdb:
    image: influxdb:2.7
    container_name: hydrotwin-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: hydrotwin_admin
      DOCKER_INFLUXDB_INIT_ORG: hydrotwin
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken-hydrotwin-2026
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: hydrotwin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.0.0
    container_name: hydrotwin-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=hydrotwin_admin
    depends_on:
      - prometheus
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  kafka_data:
  influxdb_data:
  influxdb_config:
  grafana_data:
