<!DOCTYPE html>
<html>

<head>
    <title>HydroTwin Tracker</title>
    <style>
        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0E1117;
            color: #FAFAFA;
            margin: 0;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #262730;
        }

        .header h2 {
            margin: 0;
            font-size: 16px;
            color: #4A90E2;
        }

        .metric-card {
            background: #1E212B;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid #2ECC71;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.1);
        }

        .number {
            font-size: 36px;
            font-weight: bold;
            color: #2ECC71;
            margin: 8px 0;
        }

        .label {
            font-size: 12px;
            color: #A0AEC0;
            text-transform: uppercase;
        }

        .info {
            margin-top: 16px;
            font-size: 12px;
            color: #A0AEC0;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="header">
        <span style="font-size: 24px;">🌊</span>
        <h2>HydroTwin AI Tracker</h2>
    </div>

    <div class="metric-card">
        <div class="label">Total Water Footprint</div>
        <div class="number"><span id="total-ml">0</span> ml</div>
        <div class="label">across all AI queries</div>
    </div>

    <div class="info">
        1 AI Query ≈ 22.5ml of Data Center cooling water (depending on grid & ambient temps).<br><br>
        <i>Powered by HydroTwin OS</i>
    </div>

    <script src="popup.js"></script>
</body>

</html>
