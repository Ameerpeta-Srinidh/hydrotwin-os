# ==============================================================================
# HydroTwin OS — Configuration
# ==============================================================================

# --- Plane 2: Anomaly Detection ---
anomaly_detection:
  sensor:
    min_votes: 1
    statistical:
      window_size: 100
      z_threshold: 3.0
      iqr_multiplier: 1.5
    isolation_forest:
      contamination: 0.05
      n_estimators: 100
    lstm_autoencoder:
      hidden_dim: 32
      sequence_length: 30
      threshold_percentile: 95.0
  vision:
    yolo_model_path: "yolov8n.pt"
    confidence_threshold: 0.5
    thermal_hotspot_c: 40.0
    thermal_coldspot_c: 10.0
  vibration:
    sample_rate_hz: 1000
    amplitude_threshold: 0.3
  alert_engine:
    cooldown_seconds: 300
    escalation_timeout_seconds: 900
    max_active_alerts: 100
  fusion:
    embed_dim: 64
    num_heads: 4
    num_fusion_layers: 2

# --- Plane 4: Regulatory Compliance ---
compliance:
  jurisdictions:
    - EPA_FEDERAL
    - EU_WFD
  audit_trail:
    enabled: true
  reporting:
    default_period: daily
    facility_id: HydroTwin-DC-01
  explainability:
    enabled: true

# --- Plane 1: Physics Twin ---
physics_twin:
  gnn:
    hidden_dim: 64
    num_layers: 3
    heads: 4
    dropout: 0.1
    node_feature_dim: 13
    edge_feature_dim: 7
  pinn_loss_weights:
    energy: 1.0         # λ₁ — energy conservation
    fourier: 0.5         # λ₂ — Fourier's law
    mass: 0.5            # λ₃ — mass conservation
    newton: 0.3          # λ₄ — Newton's cooling law
  training:
    epochs: 100
    learning_rate: 0.001
    num_synthetic_samples: 50
    checkpoint_dir: "checkpoints/physics_twin/"
  layout_optimizer:
    min_rack_spacing_m: 1.2
    min_aisle_width_m: 1.0
    min_crah_clearance_m: 2.0
    max_iterations: 100
    step_size: 0.1
  dxf:
    default_layer_map:
      rack: ["RACKS", "IT_RACKS", "SERVER_RACKS", "EQUIPMENT"]
      wall: ["WALLS", "A-WALL", "WALL", "PARTITION"]
      crah: ["CRAH", "COOLING", "AHU", "AIR_HANDLER"]
      column: ["COLUMN", "COLUMNS", "STRUCTURAL", "S-COLS"]
    proximity_threshold_m: 5.0
  calibration:
    frequency_seconds: 60
    sensor_topic: "sensor.cleaned"


# --- Facility Parameters ---
facility:
  name: "HydroTwin-DC-01"
  location:
    latitude: 33.4484
    longitude: -112.0740
    timezone: "US/Arizona"
    wri_basin_id: 4120  # Phoenix watershed
  thermal:
    server_inlet_min_c: 15.0    # ASHRAE A1 lower bound
    server_inlet_max_c: 32.0    # ASHRAE A1 upper bound
    thermal_mass_kj_per_c: 5000.0
    max_it_load_kw: 10000.0
  cooling:
    evap_tower_max_flow_lpm: 2000.0   # liters per minute
    chiller_max_power_kw: 3000.0
    chiller_cop: 4.5                   # coefficient of performance
    economizer_threshold_c: 18.0       # ambient below this → free cooling available

# --- RL Agent ---
agent:
  algorithm: "SAC"
  hyperparameters:
    learning_rate: 3.0e-4
    buffer_size: 1000000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    ent_coef: "auto"
    train_freq: 1
    gradient_steps: 1
  network:
    net_arch: [256, 256]
    activation: "relu"
  training:
    total_timesteps: 500000
    eval_freq: 5000
    n_eval_episodes: 10
    checkpoint_dir: "checkpoints/"
    tensorboard_log: "logs/tensorboard/"

# --- Reward Function ---
reward:
  weights:
    alpha: 0.4      # WUE weight (water)
    beta: 0.2       # PUE weight (energy)
    gamma: 0.3      # Carbon intensity weight
    delta: 0.1      # Thermal constraint satisfaction weight
  dynamic_adjustment:
    enabled: true
    clean_grid_threshold_gco2: 100    # gCO2/kWh — below this, grid is "clean"
    dirty_grid_threshold_gco2: 400    # gCO2/kWh — above this, grid is "dirty"
    alpha_range: [0.2, 0.6]
    gamma_range: [0.1, 0.5]
  thermal_constraint:
    penalty_sharpness: 2.0    # sigmoid steepness
    target_temp_c: 24.0

# --- Forecasting ---
forecasting:
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    daily_seasonality: true
    weekly_seasonality: true
    horizon_hours: 24
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    sequence_length: 168  # 7 days of hourly data
    horizon_hours: 24
  ensemble:
    prophet_weight: 0.5
    lstm_weight: 0.5

# --- External APIs ---
apis:
  electricity_maps:
    base_url: "https://api.electricitymap.org/v3"
    api_key: "${ELECTRICITY_MAPS_API_KEY}"
    cache_ttl_seconds: 300
    default_zone: "US-SW-SRP"   # Salt River Project (Phoenix)
  noaa:
    base_url: "https://www.ncdc.noaa.gov/cdo-web/api/v2"
    api_key: "${NOAA_API_KEY}"
    cache_ttl_seconds: 3600
    station_id: "GHCND:USW00023183"  # Phoenix Sky Harbor
  wri_aqueduct:
    base_url: "https://api.resourcewatch.org/v1"
    cache_ttl_seconds: 86400  # 24 hours — water stress changes slowly

# --- Workload Migration ---
migration:
  enabled: true
  trigger_conditions:
    min_ambient_temp_c: 40.0
    min_grid_carbon_gco2: 350
    min_water_stress_index: 3.0
    require_all: true     # all conditions must be met to trigger
  candidate_regions:
    - zone: "US-NW-PACW"
      name: "Pacific Northwest"
      k8s_context: "gke-portland"
    - zone: "US-MIDA-PJM"
      name: "Mid-Atlantic"
      k8s_context: "gke-virginia"
    - zone: "CA-QC"
      name: "Quebec"
      k8s_context: "gke-montreal"
    - zone: "SE"
      name: "Sweden"
      k8s_context: "gke-stockholm"
  deferrable_labels:
    - "batch-ml-training"
    - "video-transcoding"
    - "cold-storage-replication"
    - "data-pipeline-backfill"

# --- Kafka ---
kafka:
  bootstrap_servers: "localhost:9092"
  topics:
    rl_actions: "rl.actions"
    sensor_cleaned: "sensor.cleaned"
    ml_forecasts: "ml.forecasts"
    layout_updates: "layout.updates"
    anomaly_alerts: "anomaly.alerts"
  consumer_group: "plane3-nexus-agent"

# --- Dashboard API ---
dashboard:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["http://localhost:3000", "http://localhost:8501"]

# --- Observability ---
observability:
  service_name: "hydrotwin-plane3"
  exporter: "otlp"
  endpoint: "http://localhost:4317"
